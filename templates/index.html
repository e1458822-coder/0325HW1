<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Gridworld - HW1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header>
            <h1><span class="highlight">RL</span> Gridworld</h1>
            <p>HW1-1 網格地圖開發 & HW1-2 策略顯示與價值評估</p>
        </header>

        <!-- Main Application Area -->
        <main>
            <!-- Control Panel -->
            <section class="controls glass-panel">
                <div class="input-group">
                    <label for="grid-size">維度設定 (5-9):</label>
                    <input type="number" id="grid-size" min="5" max="9" value="5">
                    <button id="btn-generate" class="btn primary">Generate Square</button>
                </div>
                
                <div class="status-box">
                    <p id="status-text">Step 1: 請先產生 (Generate) 網格開始設定。</p>
                </div>
                
                <button id="btn-evaluate" class="btn success disabled" disabled>Evaluate Policy</button>
            </section>

            <!-- Grid Setup Section -->
            <section class="grid-section" id="setup-section" style="display: none;">
                <h2 id="grid-title">5 x 5 Square Setup:</h2>
                <div class="grid-container" id="main-grid">
                    <!-- JavaScript will inject grid cells here -->
                </div>
            </section>
            
            <!-- Analysis Results Section -->
            <section class="results-section" id="results-section" style="display: none;">
                <div class="result-card glass-panel">
                    <h3>Value Matrix <span class="subtitle">V(s)</span></h3>
                    <div class="grid-container" id="value-grid"></div>
                </div>
                <div class="result-card glass-panel">
                    <h3>Policy Matrix <span class="subtitle">Random</span></h3>
                    <div class="grid-container" id="policy-grid"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Logic Script -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
