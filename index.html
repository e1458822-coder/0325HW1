<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Gridworld - HW1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">    <!-- 改用相對路徑，同時支援 Flask 與 GitHub Pages -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header>
            <h1><span class="highlight">RL</span> Gridworld</h1>
            <p>HW1-1 網格地圖, HW1-2 策略評估, HW1-3 價值迭代算法</p>
        </header>

        <!-- Main Application Area -->
        <main>
            <!-- Control Panel -->
            <section class="controls glass-panel">
                <div class="input-group">
                    <label for="grid-size">維度設定 (5-9):</label>
                    <input type="number" id="grid-size" min="5" max="9" value="5">
                    <button id="btn-generate" class="btn primary">Generate Square</button>
                </div>
                
                <div class="status-box">
                    <p id="status-text">Step 1: 請先產生 (Generate) 網格開始設定。</p>
                </div>
                
                <div class="action-buttons">
                    <button id="btn-eval-random" class="btn secondary disabled" disabled>HW1-2 生成隨機策略</button>
                    <button id="btn-val-iter" class="btn success disabled" disabled>HW1-3 最佳價值迭代</button>
                </div>
            </section>

            <!-- Grid Setup Section -->
            <section class="grid-section" id="setup-section" style="display: none;">
                <h2 id="grid-title">5 x 5 Square Setup:</h2>
                <div class="grid-container" id="main-grid">
                    <!-- JavaScript will inject grid cells here -->
                </div>
            </section>
            
            <!-- Analysis Results Section -->
            <section class="results-section" id="results-section" style="display: none;">
                <div class="result-card glass-panel" id="result-wrapper">
                    <h3 id="result-val-title">Value Matrix <span class="subtitle">V(s)</span></h3>
                    <div class="grid-container" id="value-grid"></div>
                </div>
                <div class="result-card glass-panel">
                    <h3 id="result-pol-title">Policy Matrix <span class="subtitle">Policy</span></h3>
                    <div class="grid-container" id="policy-grid"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- 改用相對路徑，同時支援 Flask 與 GitHub Pages -->
    <script src="static/js/main.js"></script>
</body>
</html>
